version: "2.0"

services:
  ace777:
    image: ghcr.io/chrismura/ace777-akash:latest
    env:
      - BINANCE_API_KEY=REMPLACE_PAR_TA_CLE
      - BINANCE_API_SECRET=REMPLACE_PAR_TON_SECRET
      - BINANCE_BASE_URL_OVERRIDE=https://testnet.binancefuture.com
      - RUN_DURATION=04:00:00
      - LAUNCH_SCRIPT=./launch_test_master_base_v8_6_fortress.sh
      - MOMENTUM_THRESHOLD=0.95
      - WALL_DROP_THRESHOLD=0.060
      - BUY_USDT_BETA=150
      - BUY_USDT_ALPHA=750
      - GLOBAL_STOP_USDT=-32.00
      - FLUID_EXIT_SENSITIVITY=1.0
      - DYNAMIC_HOLD=TRUE
    expose:
      - port: 3000
        to:
          - global: true

profiles:
  compute:
    ace777:
      resources:
        cpu:
          units: 1
        memory:
          size: 1Gi
        storage:
          - size: 5Gi
  placement:
    dcloud:
      pricing:
        ace777:
          denom: uakt
          amount: 5000

deployment:
  ace777:
    dcloud:
      profile: ace777
      count: 1
